// ═══ ROUTER ═══
function go(cmd){
  cmd=cmd.toLowerCase().trim();
  if(!cmd)return;
  add(cmd,'msg-user');
  document.getElementById('prompt').value='';
  setTimeout(function(){
    if(cmd==='help'||cmd==='menu'||cmd==='↩ menu') showWelcome();
    else if(cmd==='clear'){O().innerHTML='';showWelcome();}
    else if(cmd==='problem'||cmd==='↩ problem') cmdProblem();
    else if(cmd==='solution'||cmd==='↩ solution') cmdSolution();
    else if(cmd==='market'||cmd==='↩ market') cmdMarket();
    else if(cmd==='execution'||cmd==='↩ execution') cmdExecution();
    else if(cmd==='bottleneck') cmdBottleneck();
    else if(cmd==='case: offshore'||cmd==='offshore') cmdOffshore();
    else if(cmd==='case: compute'||cmd==='compute') cmdCompute();
    else if(cmd==='product'||cmd==='the product') cmdProduct();
    else if(cmd==='routing'||cmd==='smart routing') cmdRouting();
    else if(cmd==='architecture'||cmd==='under the hood') cmdArchitecture();
    else if(cmd==='deploy'||cmd==='deploy in 60s') cmdDeploy();
    else if(cmd==='economics'||cmd==='unit economics') cmdEconomics();
    else if(cmd==='landscape') cmdLandscape();
    else if(cmd==='moat'||cmd==='defensibility') cmdMoat();
    else if(cmd==='tam'||cmd==='tam & segments') cmdTAM();
    else if(cmd==='validation'||cmd==='phase 1: validation') cmdValidation();
    else if(cmd==='raise'||cmd==='phase 2: raise') cmdRaise();
    else if(cmd==='build'||cmd==='phase 3: build') cmdBuild();
    else if(cmd==='poc'||cmd==='phase 4-5: poc & expand'||cmd==='phase 4: poc') cmdPOC();
    else {
      add('Command not found: '+cmd+'. Type <span class="hl">menu</span> to start over.');
      sug(['menu','clear']);
    }
  }, 150);
}

document.getElementById('prompt').addEventListener('keydown',function(e){
  if(e.key==='Enter') go(this.value);
});
document.getElementById('sbtn').onclick = function(){
  go(document.getElementById('prompt').value);
};
